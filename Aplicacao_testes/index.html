<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Correção de Testes | Equilibrium</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar no-print">
      <div class="sidebar-brand">
        <img src="/logo2.png" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'" />
        <div><div class="brand-name">Equilibrium</div><div class="brand-sub">Neuropsicologia</div></div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" href="/"><span class="nav-icon">📊</span><span>Dashboard</span></a>
        <a class="nav-item" href="/#pacientes"><span class="nav-icon">👤</span><span>Pacientes</span></a>
        <a class="nav-item" href="/Correcao_testes/"><span class="nav-icon">✏️</span><span>Correção de Testes</span></a>
        <a class="nav-item active" href="/Aplicacao_testes/"><span class="nav-icon">🧠</span><span>Aplicação de Testes</span></a>
        <a class="nav-item" href="/#relatorios"><span class="nav-icon">📄</span><span>Relatórios</span></a>
        <a class="nav-item" href="/check_list/"><span class="nav-icon">✅</span><span>Checklist</span></a>
        <a class="nav-item" href="/#config"><span class="nav-icon">⚙️</span><span>Configurações</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info"><div class="user-avatar">W</div><div><div class="user-name">Wessilon</div><div class="user-role">Profissional</div></div></div>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Aplicacao de Testes</h1>
          <p class="page-subtitle">Selecione o instrumento para iniciar</p>
        </div>
      </div>

        <div class="test-card" onclick="location.href='/Aplicacao_testes/SRS2/index.html'">
          <div class="test-name" style="color: var(--teal)">SRS-2</div>
          <div class="test-desc">Responsividade Social (2.5-65 anos)</div>
          <div class="test-status"><span class="badge badge-green">Ativo</span></div>
        </div>

        </div>
      </div>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script>if (!isAuthed()) location.href = '/login.html';</script>
</body>
